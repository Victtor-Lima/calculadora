<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somando valores</title>
    <link rel="stylesheet" href="estilos/mobile.css">
</head>
<body>
    <main>     
        <section class="container">
            <h1>Calculadora</h1>
            <p>Preencha os campos abaixo e receber seu resultado!</p>
            <input type="number" name="tn1" id="tn1"> +
            <input type="number" name="tn2" id="tn2">
            <input type="button" value="Somar" onclick="somar()">
            <div id="res">Resultado:</div>
        </section>
    </main>
    <script>
        function somar(){ 
            var tn1 = window.document.getElementById('tn1')
            var tn2 = window.document.getElementById('tn1')
            var res = window.document.getElementById('res')
            var n1 = Number(tn1.value)
            var n2 = Number(tn2.value)
            var s = n1 + n2
            res.innerHTML = `A soma entre ${n1} e ${n2} é igual a ${s}.`
        }
    </script>
</body>
</html>
